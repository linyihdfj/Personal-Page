name: Deploy to GitHub Pages

on:
  # 每当你把代码推送到这些分支时触发
  push:
    branches: [main, master, develop]
  # 也允许你从 Actions 标签页手动触发此工作流
  workflow_dispatch:

# 将 GITHUB_TOKEN 的权限设置为允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时进行一次部署，跳过队列中的运行
# 但是，不要取消正在进行的运行，因为我们希望让这些生产部署完成
concurrency:
  group: pages
  cancel-in-progress: false

env:
  BUILD_PATH: "." # Astro 项目所在的路径

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          path: ${{ env.BUILD_PATH }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
